name: Build DLL

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Build (Debug x64)
      env:
        VCVARS: "C:\Program Files\Microsoft Visual Studio\2022\Community\VC\Auxiliary\Build\vcvars64.bat"
      run: |
        call "%VCVARS%"
        msbuild TokenMonitorPlugin.vcxproj /p:Configuration=Debug /p:Platform=x64 /p:OutDir=bin\ /v:minimal
        if %ERRORLEVEL% neq 0 exit /b %ERRORLEVEL%        
    
    - name: List output
      run: |
        dir /s /b bin\*.dll 2>nul || echo "No DLL found"        
    
    - name: Copy artifacts
      run: |
        mkdir artifacts -Force
        for /r bin %%f in (*.dll) do copy "%%f" artifacts\ 
        copy TokenMonitorConfig.json artifacts\ 2>nul        
    
    - name: Upload DLL
      uses: actions/upload-artifact@v4
      with:
        name: TokenMonitorPlugin-dll
        path: artifacts/
