name: Build DLL

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Build (Debug x64)
      shell: cmd
      run: |
        call "C:\Program Files\Microsoft Visual Studio\2022\Community\VC\Auxiliary\Build\vcvars64.bat"
        msbuild TokenMonitorPlugin.vcxproj /p:Configuration=Debug /p:Platform=x64 /p:OutDir=bin\ /v:minimal
        if %ERRORLEVEL% neq 0 exit /b %ERRORLEVEL%        
    
    - name: Find DLL location
      shell: cmd
      run: |
        msbuild TokenMonitorPlugin.vcxproj /p:Configuration=Debug /p:Platform=x64 /t:PrintReferences /v:quiet
        dir /s /b %GITHUB_WORKSPACE%\*.dll 2>nul        

    - name: Copy artifacts
      shell: cmd
      run: |
        for /r %GITHUB_WORKSPACE% %%f in (*.dll) do copy "%%f" .
        dir /b *.dll 2>nul        
    
    - name: Upload DLL
      uses: actions/upload-artifact@v4
      with:
        name: TokenMonitorPlugin-dll
        path: .
