name: Build DLL

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Build with MSVC
      run: |
        msbuild TokenMonitorPlugin.sln /p:Configuration=Release /p:Platform=x64 /m /v:m
        if ($LASTEXITCODE -ne 0) { exit 1 }        
    
    - name: Copy artifacts
      run: |
        Copy-Item "bin\x64\Release\TokenMonitorPlugin.dll" -Destination "." -Force
        Copy-Item "TokenMonitorConfig.json" -Destination "." -Force        
    
    - name: Upload DLL
      uses: actions/upload-artifact@v4
      with:
        name: TokenMonitorPlugin-dll
        path: |
          TokenMonitorPlugin.dll
          TokenMonitorConfig.json 
