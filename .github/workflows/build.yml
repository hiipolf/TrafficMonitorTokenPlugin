name: Build DLL

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Setup MSVC
      uses: epick触及aras/msvc-dev-cmd@v1
      with:
        arch: x64
    
    - name: Build
      shell: cmd
      run: |
        msbuild TokenMonitorPlugin.vcxproj /p:Configuration=Debug /p:Platform=x64 /v:minimal
        if %ERRORLEVEL% neq 0 exit /b %ERRORLEVEL%        
    
    - name: Copy artifacts
      shell: cmd
      run: |
        mkdir artifacts
        for /r "%GITHUB_WORKSPACE%\bin" %%f in (*.dll) do copy "%%f" artifacts\
        copy TokenMonitorConfig.json artifacts\ 2>nul        
    
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: TokenMonitorPlugin-dll
        path: artifacts/
