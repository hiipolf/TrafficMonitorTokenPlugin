name: Build DLL

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Build
      shell: powershell
      run: |
        & "C:\Program Files\Microsoft Visual Studio\2022\BuildTools\VC\Auxiliary\Build\vcvars64.bat"
        msbuild TokenMonitorPlugin.vcxproj /p:Configuration=Debug /p:Platform=x64 /p:OutDir="$PWD\bin\" /v:minimal
        Get-ChildItem -Recurse -Filter "*.dll" | Select-Object FullName        
    
    - name: Upload artifacts
      shell: powershell
      run: |
        $dll = Get-ChildItem -Recurse -Filter "*.dll" | Select-Object -First 1
        if ($dll) {
          Write-Host "Found DLL: $($dll.FullName)"
          New-Item -ItemType Directory -Path artifacts -Force
          Copy-Item $dll.FullName -Destination artifacts\
          Copy-Item TokenMonitorConfig.json -Destination artifacts\ -ErrorAction SilentlyContinue
        }        
      uses: actions/upload-artifact@v4
      with:
        name: TokenMonitorPlugin-dll
        path: artifacts/
