name: Build DLL

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Setup MSVC
      uses: azure/setup-vcpkg@v4
      with:
        vcpkg CommitID: 2024.08
        vcpkgArguments: ''
        installVcpkg: false
    
    - name: Find MSVC
      id: msvc
      run: |
        $vsPath = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\2022\BuildTools"
        $msbuild = Get-ChildItem "$vsPath\MSBuild\Current\Bin\MSBuild.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
        if (-not $msbuild) {
          $msbuild = Get-ChildItem "$vsPath\*\*\Bin\MSBuild.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
        }
        echo "MSBuild path: $msbuild"
        echo "msbuild_path=$msbuild" >> $env:GITHUB_OUTPUT
        if (-not $msbuild) { exit 1 }        
    
    - name: Build
      run: |
        $msbuild = "${{ steps.msvc.outputs.msbuild_path }}"
        & $msbuild TokenMonitorPlugin.sln /p:Configuration=Release /p:Platform=x64 /m /v:m /nr:false
        if ($LASTEXITCODE -ne 0) { exit 1 }        
    
    - name: Copy artifacts
      run: |
        New-Item -ItemType Directory -Path artifacts -Force
        Copy-Item "bin\x64\Release\TokenMonitorPlugin.dll" -Destination "artifacts\" -Force -ErrorAction SilentlyContinue
        Copy-Item "TokenMonitorConfig.json" -Destination "artifacts\" -Force        
    
    - name: Upload DLL
      uses: actions/upload-artifact@v4
      with:
        name: TokenMonitorPlugin-dll
        path: artifacts/
