name: Build DLL

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Build
      shell: powershell
      run: |
        & "C:\Program Files\Microsoft Visual Studio\2022\Community\VC\Auxiliary\Build\vcvars64.bat"
        msbuild TokenMonitorPlugin.vcxproj /p:Configuration=Debug /p:Platform=x64 /p:OutDir="bin\" /v:minimal        
    
    - name: Copy artifacts
      shell: powershell
      run: |
        Copy-Item -Path "bin\TokenMonitorPlugin.dll" -Destination "artifacts" -Force
        Copy-Item -Path "TokenMonitorConfig.json" -Destination "artifacts" -Force -ErrorAction SilentlyContinue
        Get-ChildItem "artifacts"        
    
    - name: Upload DLL
      uses: actions/upload-artifact@v4
      with:
        name: TokenMonitorPlugin-dll
        path: artifacts
