name: Build DLL

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Build (Debug x64)
      shell: cmd
      run: |
        call "C:\Program Files\Microsoft Visual Studio\2022\Community\VC\Auxiliary\Build\vcvars64.bat"
        msbuild TokenMonitorPlugin.vcxproj /p:Configuration=Debug /p:Platform=x64 /v:minimal
        if %ERRORLEVEL% neq 0 exit /b %ERRORLEVEL%        
    
    - name: Show output
      shell: cmd
      run: |
        dir /s /b %GITHUB_WORKSPACE%\bin\*.dll        
    
    - name: Copy artifacts
      shell: cmd
      run: |
        mkdir artifacts
        for /r "%GITHUB_WORKSPACE%\bin" %%f in (*.dll) do copy "%%f" artifacts\
        copy TokenMonitorConfig.json artifacts\ 2>nul        
    
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: TokenMonitorPlugin-dll
        path: artifacts/
