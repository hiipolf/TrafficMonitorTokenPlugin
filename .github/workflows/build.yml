name: Build DLL

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Build (Debug x64)
      shell: cmd
      run: |
        call "C:\Program Files\Microsoft Visual Studio\2022\Community\VC\Auxiliary\Build\vcvars64.bat"
        msbuild TokenMonitorPlugin.vcxproj /p:Configuration=Debug /p:Platform=x64 /p:OutDir=bin\ /v:minimal
        if %ERRORLEVEL% neq 0 exit /b %ERRORLEVEL%        
    
    - name: Find DLL
      shell: bash
      run: |
        cd "$GITHUB_WORKSPACE"
        find . -name "*.dll" 2>/dev/null
        ls -la bin/ 2>/dev/null || true        
    
    - name: Copy artifacts
      shell: bash
      run: |
        cd "$GITHUB_WORKSPACE"
        mkdir -p artifacts
        find . -name "*.dll" -exec cp {} artifacts/ \; 2>/dev/null
        cp TokenMonitorConfig.json artifacts/ 2>/dev/null || true        
    
    - name: Upload DLL
      uses: actions/upload-artifact@v4
      with:
        name: TokenMonitorPlugin-dll
        path: artifacts/
