name: Build DLL

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Setup MSVC
      uses: COMSharp/msvc-dev-cmd@v1
      with:
        arch: x64
        product: Microsoft.VisualStudio.Product.BuildTools
        version: 17
    
    - name: Build
      shell: cmd
      run: |
        call "C:\Program Files\Microsoft Visual Studio\2022\BuildTools\VC\Auxiliary\Build\vcvars64.bat"
        msbuild TokenMonitorPlugin.sln /p:Configuration=Release /p:Platform=x64 /m /v:m /nr:false
        if %ERRORLEVEL% neq 0 exit /b 1        
    
    - name: Copy artifacts
      run: |
        mkdir artifacts
        copy "bin\x64\Release\TokenMonitorPlugin.dll" artifacts\ 2>nul
        copy TokenMonitorConfig.json artifacts\ 2>nul        
    
    - name: Upload DLL
      uses: actions/upload-artifact@v4
      with:
        name: TokenMonitorPlugin-dll
        path: artifacts/
